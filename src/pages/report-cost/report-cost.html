<!-- BỘ LỌC -->
<div id="filter-wrapper-cost" class="mb-4" style="animation: slideUp 0.4s ease forwards;"></div>

<!-- BẢNG DỮ LIỆU -->
<div class="row" style="animation: slideUp 0.5s ease forwards;">
  <div class="col-12">
    <div class="card">
      <div class="card-header">
        <span>Chi tiết Chi phí thực hiện Tiệc</span>
      </div>
      <div class="table-wrapper">
        <table class="data-table" id="cost-table">
          <thead>
            <tr>
              <th style="width: 100px;">Mã HĐ</th>
              <th>Khách hàng</th>
              <th class="text-center" style="width: 120px;">Ngày tổ chức</th>
              <th class="text-end">Chi phí Thực đơn</th>
              <th class="text-end">Chi phí Dịch vụ</th>
              <th class="text-end">Chi phí Nhân sự</th>
              <th class="text-end">Tổng Chi Phí</th>
            </tr>
          </thead>
          <tbody>
            <!-- RENDER BỞI JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- TOTAL BAR -->
<div id="total-bar-wrapper-cost" class="mt-3"></div>
