<div class="row g-4" style="animation: slideUp 0.3s ease forwards;">

  <div class="col-lg-2 col-md-3">
    <div class="card">
      <div class="card-header" style="background: var(--color-background);">

      </div>
      <div class="card-body p-2" id="role-list-container">

      <div class="card-body table-wrapper p-0" style="border-radius:0 0 8px 8px; overflow-x: auto; -webkit-overflow-scrolling: touch;">

              <th class="text-center" style="width: 56px; font-size: 11px; white-space: normal; line-height: 1.3;" title="Mở Chứng Từ">Mở CT</th>
              <th class="text-center" style="width: 56px; font-size: 11px; white-space: normal; line-height: 1.3;" title="Xuất Excel">Xuất Excel</th>
            </tr>
          </thead>
