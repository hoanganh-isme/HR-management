<!-- KẾ TOÁN & QUỸ TIỀN MẶT - HTML Template -->
<div class="cash-flow-module-container" style="display:flex; flex-direction:column; min-height: 80vh; width: 100%;">
  
  <div class="summary-cards row g-3 mb-4 mt-2 px-2">
    <div class="col-md-4">
      <div class="p-3" style="background:var(--color-background); border-radius:12px; border:1px solid var(--color-border); box-shadow:0 2px 8px rgba(0,0,0,0.04);">
        <div style="font-size:13px; color:var(--color-text-secondary); margin-bottom:4px;">Tổng Thu (Kỳ Hiện Tại)</div>
        <div id="cf-total-in" style="font-size:24px; font-weight:700; color:var(--color-success);">Đang tải...</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="p-3" style="background:var(--color-background); border-radius:12px; border:1px solid var(--color-border); box-shadow:0 2px 8px rgba(0,0,0,0.04);">
        <div style="font-size:13px; color:var(--color-text-secondary); margin-bottom:4px;">Tổng Chi (Kỳ Hiện Tại)</div>
        <div id="cf-total-out" style="font-size:24px; font-weight:700; color:var(--color-danger);">Đang tải...</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="p-3" style="background:linear-gradient(135deg, var(--color-primary), #1a56db); border-radius:12px; border:1px solid var(--color-border); box-shadow:0 4px 12px rgba(37,99,235,0.2); color:white;">
        <div style="font-size:13px; opacity:0.9; margin-bottom:4px;">Quỹ Tiền Mặt Hiện Tại</div>
        <div id="cf-balance" style="font-size:24px; font-weight:700;">Đang tải...</div>
      </div>
    </div>
  </div>

  <div class="custom-tabs-header px-2">
    <button id="tab-thu-btn" class="custom-tab-btn active">
      <i class="material-symbols-outlined align-middle me-1" style="font-size: 18px;">arrow_circle_down</i>
      Phiếu Thu
    </button>
    <button id="tab-chi-btn" class="custom-tab-btn">
      <i class="material-symbols-outlined align-middle me-1" style="font-size: 18px;">arrow_circle_up</i>
      Phiếu Chi
    </button>
    <button id="tab-danhmuc-btn" class="custom-tab-btn">
      <i class="material-symbols-outlined align-middle me-1" style="font-size: 18px;">category</i>
      Danh mục Thu/Chi
    </button>
  </div>

  <!-- Tabs Content -->
  <div class="tab-content pt-3 px-2" style="flex:1; width: 100%; background: transparent;" id="cashFlowTabsContent">
    
    <!-- PANE 1: PHIẾU THU -->
    <div id="tab-thu-pane" style="display: block; width: 100%;">
      <div id="thu-list-view"></div>
    </div>
    
    <!-- PANE 2: PHIẾU CHI -->
    <div id="tab-chi-pane" style="display: none; width: 100%;">
      <div id="chi-list-view"></div>
    </div>

    <!-- PANE 3: DANH MỤC THU CHI -->
    <div id="tab-danhmuc-pane" style="display: none; width: 100%;">
      <div id="danhmuc-list-view"></div>
    </div>

  </div>
</div>
