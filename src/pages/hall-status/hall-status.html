<div class="page-body">
  <div class="card mb-4">
    <div class="card-body">
      <!-- Bộ lọc -->
      <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
        <label>Ngày xem:</label>
        <div style="width: 180px; flex-shrink: 0;">
          <input type="date" class="ui-input w-100" id="hall-status-date">
        </div>
        <div class="legend d-flex gap-3 ms-auto" style="font-size: 14px;">
          <span class="d-flex align-items-center gap-1"><span style="display:inline-block;width:16px;height:16px;background:var(--color-success);border-radius:4px;"></span> Trống</span>
          <span class="d-flex align-items-center gap-1"><span style="display:inline-block;width:16px;height:16px;background:var(--color-warning);border-radius:4px;"></span> Đã cọc</span>
          <span class="d-flex align-items-center gap-1"><span style="display:inline-block;width:16px;height:16px;background:var(--color-danger);border-radius:4px;"></span> Đã ký HĐ</span>
          <span class="d-flex align-items-center gap-1"><span style="display:inline-block;width:16px;height:16px;background:#64748b;border-radius:4px;"></span> Bảo trì</span>
        </div>
      </div>
      
      <!-- Thống kê nhanh -->
      <div id="hall-stats-container" class="mb-4 d-flex gap-3 flex-wrap"></div>
      
      <!-- Grid sảnh -->
      <div id="hall-status-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
        <!-- Sảnh render ở đây bằng JS -->
      </div>
    </div>
  </div>
</div>
