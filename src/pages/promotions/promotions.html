<!-- ═══════════════════════════════════════════
   CHƯƠNG TRÌNH ƯU ĐÃI / COMBO - HTML Template
   Route: #/promotions | Module: DanhMuc
   Mục IV.1 - REQUIREMENT.md
   ═══════════════════════════════════════════ -->

<div id="promo-list-view"></div>

<!-- Slide-over Panel Form Combo -->
<div id="promo-form-overlay" class="sidebar-overlay"></div>
<div id="promo-form-panel" style="position: fixed; top: 0; right: -840px; width: 100%; max-width: 840px; height: 100vh; background: var(--color-surface); box-shadow: -10px 0 30px rgba(0,0,0,0.12); transition: right 0.3s ease; z-index: 10000; display: flex; flex-direction: column;">

  <!-- Panel Header -->
  <div class="d-flex justify-content-between align-items-center p-4" style="border-bottom: 1px solid var(--color-border); background: var(--color-background);">
    <div>
      <h2 class="mb-0" style="font-size: 20px;">Chương Trình Ưu Đãi / Combo</h2>
      <div style="font-size: 13px; color: var(--color-text-secondary); margin-top: 2px;" id="promo-panel-subtitle">Thiết lập gói combo mới</div>
    </div>
    <button id="btn-close-promo-form" class="icon-btn" style="background: transparent; border: none;">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  <!-- Panel Body -->
  <div style="flex: 1; overflow-y: auto; padding: 24px;">

    <!-- 1. Thông tin Combo -->
    <div class="card mb-4" style="box-shadow: none;">
      <div class="card-header" style="padding: 16px; background: var(--color-background); font-size: 14px; color: var(--color-text-secondary);">
        <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 18px; margin-right: 4px;">local_offer</span>
        1. Thông Tin Gói Combo
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Mã Combo</label>
            <input type="text" class="ui-input w-100" value="COMBO-AUTO" readonly style="background: rgba(148,163,184,0.1); color: #64748b; font-weight: 600;">
          </div>
          <div class="col-md-8">
            <label class="form-label">Tên Gói Combo <span style="color: var(--color-danger);">*</span></label>
            <input type="text" id="promo-inp-name" class="ui-input w-100" placeholder="VD: Lộc Phát Premium, Hạnh Phúc Standard...">
          </div>
          <div class="col-md-6">
            <label class="form-label">Ngày Bắt Đầu <span style="color: var(--color-danger);">*</span></label>
            <input type="date" id="promo-inp-from" class="ui-input w-100">
          </div>
          <div class="col-md-6">
            <label class="form-label">Ngày Kết Thúc <span style="color: var(--color-danger);">*</span></label>
            <input type="date" id="promo-inp-to" class="ui-input w-100">
          </div>
          <div class="col-md-4">
            <label class="form-label">Từ Số Bàn</label>
            <input type="number" id="promo-inp-ban-from" class="ui-input w-100" placeholder="VD: 20" min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label">Đến Số Bàn</label>
            <input type="number" id="promo-inp-ban-to" class="ui-input w-100" placeholder="VD: 100" min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label">Trạng Thái</label>
            <select id="promo-inp-status" class="ui-input w-100">
              <option value="active">✅ Đang áp dụng</option>
              <option value="draft">⏳ Chưa áp dụng</option>
              <option value="expired">🔴 Ngừng áp dụng</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Giá Bàn Mặn (đ)</label>
            <input type="number" id="promo-inp-price-man" class="ui-input w-100" placeholder="VD: 22500000" min="0">
          </div>
          <div class="col-md-6">
            <label class="form-label">Giá Bàn Chay (đ)</label>
            <input type="number" id="promo-inp-price-chay" class="ui-input w-100" placeholder="VD: 18000000" min="0">
          </div>
        </div>
      </div>
    </div>

    <!-- 2. Danh sách Ưu đãi -->
    <div class="card mb-4" style="box-shadow: none;">
      <div class="card-header d-flex justify-content-between align-items-center" style="padding: 16px; background: var(--color-background); font-size: 14px; color: var(--color-text-secondary);">
        <span>
          <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 18px; margin-right: 4px;">redeem</span>
          2. Danh Sách Ưu Đãi Kèm Theo
        </span>
        <button id="btn-add-benefit" class="btn d-flex align-items-center gap-1" style="font-size: 13px; padding: 6px 12px; border: 1px dashed var(--color-border); background: transparent;">
          <span class="material-symbols-outlined" style="font-size: 16px;">add</span> Thêm ưu đãi
        </button>
      </div>
      <div class="card-body p-0">
        <table class="data-table" id="promo-benefits-table">
          <thead>
            <tr>
              <th style="width: 40px;">#</th>
              <th>Tên Ưu Đãi / Mô Tả</th>
              <th style="width: 160px;">Số Lượng / Đơn Vị</th>
              <th style="width: 120px;">Giá Trị (đ)</th>
              <th style="width: 60px;"></th>
            </tr>
          </thead>
          <tbody id="promo-benefits-body">
            <tr data-row="1">
              <td style="color: var(--color-text-secondary); font-size: 13px;">1</td>
              <td><input type="text" class="ui-input w-100" placeholder="VD: Bánh cưới 5 tầng" style="border: none; background: transparent;"></td>
              <td><input type="text" class="ui-input w-100" placeholder="VD: 1 cái" style="border: none; background: transparent;"></td>
              <td><input type="number" class="ui-input w-100" placeholder="0" style="border: none; background: transparent;" min="0"></td>
              <td><button class="icon-btn btn-remove-benefit" style="color: var(--color-danger);"><span class="material-symbols-outlined" style="font-size: 18px;">delete</span></button></td>
            </tr>
            <tr data-row="2">
              <td style="color: var(--color-text-secondary); font-size: 13px;">2</td>
              <td><input type="text" class="ui-input w-100" placeholder="VD: Rượu vang" style="border: none; background: transparent;"></td>
              <td><input type="text" class="ui-input w-100" placeholder="VD: 4 chai / 10 bàn" style="border: none; background: transparent;"></td>
              <td><input type="number" class="ui-input w-100" placeholder="0" style="border: none; background: transparent;" min="0"></td>
              <td><button class="icon-btn btn-remove-benefit" style="color: var(--color-danger);"><span class="material-symbols-outlined" style="font-size: 18px;">delete</span></button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 3. Ghi chú -->
    <div class="card" style="box-shadow: none;">
      <div class="card-header" style="padding: 16px; background: var(--color-background); font-size: 14px; color: var(--color-text-secondary);">
        <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 18px; margin-right: 4px;">notes</span>
        3. Điều Kiện & Ghi Chú
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Điều kiện áp dụng</label>
            <textarea rows="2" id="promo-inp-condition" class="ui-input w-100" placeholder="VD: Áp dụng cho tiệc cưới, không áp dụng cho tiệc tất niên và sinh nhật..." style="resize: vertical;"></textarea>
          </div>
          <div class="col-12">
            <label class="form-label">Ghi chú thêm</label>
            <textarea rows="2" id="promo-inp-note" class="ui-input w-100" placeholder="Ghi chú nội bộ cho nhân viên Sales..." style="resize: vertical;"></textarea>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Panel Footer -->
  <div class="d-flex justify-content-end gap-2 p-3" style="border-top: 1px solid var(--color-border); background: var(--color-background);">
    <button id="btn-cancel-promo-form" class="btn btn-secondary">Hủy Bỏ</button>
    <button id="btn-save-promo" class="btn btn-primary d-flex align-items-center gap-2">
      <span class="material-symbols-outlined" style="font-size: 18px;">save</span>
      Lưu Gói Combo
    </button>
  </div>

</div>
