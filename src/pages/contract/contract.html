<div class="contract-module-container" style="display:flex; flex-direction:column; min-height: 80vh; width: 100%;">
  <div class="custom-tabs-header">
    <button id="tab-list-btn" class="custom-tab-btn active">
      Danh sách Hợp đồng
    </button>
    <button id="tab-detail-btn" class="custom-tab-btn">
      Lập / Chi tiết Hợp đồng
    </button>
  </div>



  <!-- Tabs Content -->
  <div class="tab-content" style="flex:1; width: 100%;" id="contractTabsContent">
    
    <!-- PANE 1: LIST -->
    <div id="tab-list-pane" style="display: block; padding: 0; width: 100%;">
      <div id="contract-list-view" style="width: 100%;"></div>
    </div>
    
    <!-- PANE 2: DETAIL -->
    <div id="tab-detail-pane" style="display: none; padding: 24px 0; width: 100%;">
      <div id="contract-detail-view" style="width: 100%;"></div>
    </div>
  </div>
</div>
