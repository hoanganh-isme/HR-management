<!-- ═══════════════════════════════════════════
   QUẢN LÝ DANH MỤC (MASTER DATA) - HTML Template
   ═══════════════════════════════════════════ -->

<div class="card" style="animation: slideUp 0.3s ease forwards; display: flex; flex-direction: column; height: calc(100vh - var(--header-height) - 100px);">
  


  <div style="display: flex; flex: 1; flex-wrap: wrap; overflow: hidden; position: relative;" class="categories-layout">

    <!-- CỘT TRÁI: CÂY DANH MỤC -->
    <div class="tree-column" style="flex: 0 0 300px; border-right: 1px solid var(--color-border); flex-direction: column; overflow-y: auto; background: var(--color-surface);">
      <div class="d-flex justify-content-between align-items-center p-3" style="border-bottom: 1px solid var(--color-border); position: sticky; top:0; background: var(--color-surface); z-index: 2;">
        <span class="fw-bold" style="font-size: 15px;">Phân nhóm Danh mục</span>
        <button class="btn-tool" style="padding:4px;" id="btn-mobile-close-tree" onclick="document.querySelector('.categories-layout').classList.remove('show-tree')">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="p-3" id="categories-tree-container">
        <!-- JS RENDER: TreeView -->
      </div>
    </div>

    <!-- CỘT PHẢI: NỘI DUNG ĐỘNG -->
    <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--color-surface); min-width: 300px;">
      <div class="d-flex align-items-center gap-2 p-3" style="border-bottom: 1px solid var(--color-border); background: var(--color-surface); z-index: 2; box-shadow: 0 2px 4px -2px rgba(0,0,0,0.02)">
        <button class="btn-tool" style="padding:4px;" id="btn-mobile-open-tree" onclick="document.querySelector('.categories-layout').classList.add('show-tree')">
          <span class="material-symbols-outlined">menu_open</span>
        </button>
        <span class="fw-bold" style="font-size: 18px; color: var(--color-primary);" id="current-category-title">Vui lòng chọn danh mục...</span>
      </div>
      
      <!-- VÙNG RENDER CONTENT (JS fill) -->
      <div id="category-content-container" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0;">
        <div class="d-flex flex-column align-items-center justify-content-center text-center" style="height:100%; padding: 60px; color: var(--color-text-secondary);">
          <span class="material-symbols-outlined" style="font-size: 64px; color: #cbd5e1; margin-bottom: 16px;">account_tree</span>
          <span>Click vào một loại danh mục bên gốc trái để bắt đầu thiết lập.</span>
        </div>
      </div>
    </div>

  </div>
</div>
