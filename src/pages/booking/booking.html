<!-- ═══════════════════════════════════════════
   BIÊN NHẬN CỌC CHỖ - HTML Template
   ═══════════════════════════════════════════ -->

<style>
  /* Disable hover jump effects on flat cards in booking form */
  #booking-form-panel .card {
    transform: none !important;
    transition: none !important;
    overflow: visible !important;
  }

  #booking-form-panel .card:hover {
    transform: none !important;
    box-shadow: none !important;
  }
</style>

<!-- DANH SÁCH FORM ĐỘNG -->
<div id="booking-list-view" style="width: 100%; animation: slideUp 0.3s ease forwards;"></div>

<!-- Khung Trượt Form (Slide-over Panel) -->
<div id="booking-form-panel">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center p-4"
    style="border-bottom: 1px solid var(--color-border); background: var(--color-background); position: relative; z-index: 10;">
    <h2 id="booking-form-title" class="mb-0" style="font-size: 20px;">Thêm Biên nhận Cọc Lần 1</h2>
    <button id="btn-close-booking-form" data-dismiss="side-panel" class="icon-btn" style="background: transparent; border: none;"><span
        class="material-symbols-outlined">close</span></button>
  </div>

  <!-- Body -->
  <div style="flex: 1; overflow-y: auto; padding: 24px; position: relative;">
    <!-- Thẻ 0 -->
    <div class="card mb-4" style="box-shadow: none;">
      <div class="card-header"
        style="padding: 16px; background: var(--color-background); font-size: 14px; color: var(--color-text-secondary); font-weight: 600;">
        0. Phân loại hình thức</div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Loại Tiệc <span style="color:var(--color-danger)">*</span></label>
            <select id="sel-loaitiec" class="ui-input w-100" style="font-weight: 600; color: var(--color-primary); border-color: var(--color-primary);">
              <option value="">-- Đang tải --</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Thẻ 1 -->
    <div class="card mb-4" style="box-shadow: none; overflow: visible;">
      <div class="card-header d-flex justify-content-between align-items-center"
        style="padding: 16px; background: var(--color-background); font-size: 14px; color: var(--color-text-secondary); font-weight: 600;">
        <span>1. Thông Tin Khách Hàng</span>
        <!-- Công cụ tìm khách hàng (Component) -->
        <div id="customer-search-container"></div>
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6" id="bk-col-ten-chure">
            <label class="form-label" id="bk-lbl-ten-chure">Tên Chú Rể / KH</label>
            <input type="text" id="inp-tenchure" class="ui-input w-100" placeholder="Tên chú rể / KH">
          </div>
          <div class="col-md-6" id="bk-col-dt-chure">
            <label class="form-label" id="bk-lbl-dt-chure">ĐT Chú Rể / KH</label>
            <input type="text" id="inp-dtchure" class="ui-input w-100" placeholder="SĐT liên hệ">
          </div>
          <div class="col-md-6" id="bk-col-ten-codau">
            <label class="form-label">Tên Cô Dâu</label>
            <input type="text" id="inp-tencodau" class="ui-input w-100" placeholder="Tên cô dâu">
          </div>
          <div class="col-md-6" id="bk-col-dt-codau">
            <label class="form-label">ĐT Cô Dâu</label>
            <input type="text" id="inp-dtcodau" class="ui-input w-100" placeholder="SĐT cô dâu">
          </div>
          <div class="col-md-12">
            <label class="form-label">Địa chỉ</label>
            <input type="text" id="inp-diachi" class="ui-input w-100" placeholder="Địa chỉ khách hàng">
          </div>
          <div class="col-md-6">
            <label class="form-label">Người Đại Diện</label>
            <input type="text" id="inp-nguoigd" class="ui-input w-100" placeholder="Tên người đại diện">
          </div>
          <div class="col-md-6">
            <label class="form-label">ĐT Người Đại Diện</label>
            <input type="text" id="inp-dtdai-dien" class="ui-input w-100" placeholder="SĐT người đại diện">
          </div>
          <div class="col-md-12">
            <label class="form-label">Email</label>
            <input type="text" id="inp-email" class="ui-input w-100" placeholder="Email nhận thông báo">
          </div>
          <!-- Hidden Mã chứng từ -->
          <input type="hidden" id="inp-machungtu" value="BNCC-AUTO">
        </div>
      </div>
    </div>

    <!-- Thẻ 2 -->
    <div class="card mb-4" style="box-shadow: none;">
      <div class="card-header"
        style="padding: 16px; background: var(--color-background); font-size: 14px; color: var(--color-text-secondary); font-weight: 600;">
        2. Thời gian & Địa điểm</div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Ngày tổ chức</label>
            <input type="date" id="inp-ngaytochuc" class="ui-input w-100">
          </div>
          <div class="col-md-6">
            <label class="form-label">Ca tiệc</label>
            <select id="sel-catiec" class="ui-input w-100">
              <option value="">-- Chọn Ca Tiệc --</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Bàn Mặn (Chính + Dự phòng)</label>
            <div class="d-flex gap-2">
              <div style="flex:1">
                <input type="number" id="inp-ban-man" class="ui-input w-100" placeholder="Chính" min="0">
                <div style="font-size:11px; color:var(--color-text-secondary); margin-top:2px; text-align:center;">Chính thức</div>
              </div>
              <div style="flex:1">
                <input type="number" id="inp-ban-man-dp" class="ui-input w-100" placeholder="Dự phòng" min="0">
                <div style="font-size:11px; color:var(--color-text-secondary); margin-top:2px; text-align:center;">Dự phòng</div>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Bàn Chay (Chính + Dự phòng)</label>
            <div class="d-flex gap-2">
              <div style="flex:1">
                <input type="number" id="inp-ban-chay" class="ui-input w-100" placeholder="Chính" min="0">
                <div style="font-size:11px; color:var(--color-text-secondary); margin-top:2px; text-align:center;">Chính thức</div>
              </div>
              <div style="flex:1">
                <input type="number" id="inp-ban-chay-dp" class="ui-input w-100" placeholder="Dự phòng" min="0">
                <div style="font-size:11px; color:var(--color-text-secondary); margin-top:2px; text-align:center;">Dự phòng</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Thẻ 3 -->
    <div class="card" style="box-shadow: none;">
      <div class="card-header"
        style="padding: 16px; background: var(--color-background); font-size: 14px; color: var(--color-text-secondary);">
        3. Sảnh & Đặt Cọc</div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Sảnh Đặt (Sảnh chính) <span style="color: var(--color-danger);">*</span></label>
          <select id="sel-sanh" class="ui-input w-100">
            <option value="">-- Chọn Sảnh --</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Sảnh Phụ (Ghép sảnh - Tùy chọn)</label>
          <div id="container-sanh-phu" class="d-flex flex-wrap gap-3 p-3" style="border: 1px solid var(--color-border); border-radius: 8px; background: var(--color-background); min-height: 60px; max-height: 200px; overflow-y: auto;">
            <span class="text-secondary" style="font-size: 12px; margin: auto; font-style: italic;">Vui lòng chọn Sảnh Chính trước</span>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Số tiền cọc (VNĐ) <span style="color: var(--color-danger);">*</span></label>
          <input type="text" id="inp-tiencoc" inputmode="numeric" autocomplete="off" class="ui-input w-100" placeholder="VD: 20,000,000"
            style="font-size: 16px; font-weight: bold; color: var(--color-success);">
          <div id="vn-tiencoc" style="font-size:11px; color:var(--color-success); margin-top:3px; min-height:16px; font-style:italic;"></div>
        </div>
        <div>
          <label class="form-label">Ghi chú</label>
          <textarea id="inp-ghichu" rows="2" class="ui-input w-100" placeholder="Ghi chú thêm..."></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="d-flex justify-content-end gap-2 p-3"
    style="border-top: 1px solid var(--color-border); background: var(--color-background); position: relative; z-index: 10;">
    <button id="btn-cancel-booking-form" data-dismiss="side-panel" class="btn btn-secondary">Hủy Bỏ</button>
    <button id="btn-save-booking" class="btn btn-primary d-flex align-items-center gap-2">
      <span class="material-symbols-outlined" style="font-size: 18px;">save</span>
      Lưu Phiếu Cọc
    </button>
  </div>
</div>
