<div class="checkout-module-container" style="display:flex; flex-direction:column; min-height: 80vh; width: 100%;">
  <div class="custom-tabs-header">
    <button id="checkout-tab-list-btn" class="custom-tab-btn active">
      Danh sách Quyết toán
    </button>
    <button id="checkout-tab-detail-btn" class="custom-tab-btn">
      Chi tiết Quyết toán
    </button>
  </div>

  <!-- Tabs Content -->
  <div class="tab-content" style="flex:1; width: 100%;" id="checkoutTabsContent">

    <!-- PANE 1: LIST -->
    <div id="checkout-tab-list-pane" style="display: block; padding: 0; width: 100%;">
      <div id="checkout-list-view" style="width: 100%;"></div>
    </div>

    <!-- PANE 2: DETAIL -->
    <div id="checkout-tab-detail-pane" style="display: none; padding: 24px 0; width: 100%;">
      <div id="checkout-detail-view" style="width: 100%;"></div>
    </div>
  </div>
</div>
