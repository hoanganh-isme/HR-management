<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <!-- SEO & PWA Meta -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.1, maximum-scale=5.0">
  <meta name="description" content="Phần mềm Quản lý Tiệc Cưới — Booking, Hợp đồng, Quyết toán, Báo cáo">
  <meta name="theme-color" content="#4F46E5">
  <title>PMQL Tiệc Cưới</title>

  <!-- ══════════════════════════════════════════════
       CSS
       ══════════════════════════════════════════════ -->
  <!-- Bootstrap 5: Grid + Utilities -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-grid.min.css"
    crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-utilities.min.css"
    crossorigin="anonymous">
  <!-- App Styles (design-tokens + global + layouts + 30 components) -->
  <link rel="stylesheet" href="./src/css/styles.bundle.css?v=83">

  <!-- Thư viện Flatpickr (Datepicker đẹp) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet">
</head>

<body>

  <!-- ══════════════════════════════════════════════
       APP SHELL
       ══════════════════════════════════════════════ -->
  <div id="app">

    <!-- Navbar / Sidebar container -->
    <div id="navbar-container"></div>

    <!-- Splash screen khi JS chưa load xong -->
    <div id="app-splash"
      style="display:flex; align-items:center; justify-content:center; height:80vh; flex-direction:column; gap:16px;">
      <div
        style="width:40px; height:40px; border:3px solid var(--color-border); border-top-color:var(--color-primary); border-radius:50%; animation:spin 0.8s linear infinite;">
      </div>
      <span style="color:var(--color-text-secondary); font-size:14px;">Đang tải hệ thống...</span>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>

    <!-- Vùng nội dung chính (Router inject vào đây) -->
    <div id="app-content" class="app-content" style="display:none;">
    </div>

  </div>

  <!-- Modal container -->
  <div id="modal-container"></div>

  <!-- ══════════════════════════════════════════════
       SCRIPTS
       ══════════════════════════════════════════════ -->
  <!-- 1. Thư viện ngoài (defer = không block render) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr" defer></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>

  <!-- APP CONFIG -->
  <script src="./env.js?v=4"></script>

  <!-- 2. App Bundle (mockData + utils + services + plugins + components) -->
  <script src="./src/js/app.bundle.js?v=107"></script>

  <!-- 3. Core System -->
  <script src="./src/js/core/router.js?v=56"></script>
  <script src="./src/js/core/index.js?v=26"></script>

  <!-- 4. Tắt splash → hiện app -->
  <script>
    (function () {
      var splash = document.getElementById('app-splash');
      var content = document.getElementById('app-content');
      if (splash) splash.style.display = 'none';
      if (content) content.style.display = '';
    })();
  </script>
</body>

</html>
