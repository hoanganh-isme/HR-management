<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mất kết nối - Quản lý Tiệc Cưới</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #334155;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #e2e8f0; }
      .offline-card { background: #1e293b; border-color: #334155; }
      .btn-retry { background: #4f46e5; }
      .btn-retry:hover { background: #4338ca; }
    }
    .offline-card {
      text-align: center;
      max-width: 400px;
      width: 100%;
      padding: 48px 32px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn-retry {
      display: inline-block;
      padding: 12px 32px;
      background: #4f46e5; /* Primary color */
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms ease, transform 150ms ease;
    }
    .btn-retry:hover { background: #4338ca; transform: translateY(-1px); }
    .btn-retry:active { transform: translateY(0); }
    .hint {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">🥂</div>
    <h1>Không có kết nối mạng</h1>
    <p>Vui lòng kiểm tra WiFi hoặc kết nối của bạn rồi thử lại.</p>
    <button class="btn-retry" onclick="location.reload()">Thử lại</button>
    <div class="hint">Phần mềm Quản lý Tiệc Cưới cần kết nối mạng để đồng bộ dữ liệu.</div>
  </div>
  <script>
    // Auto-reload when back online
    window.addEventListener('online', function () {
      location.reload();
    });
  </script>
</body>
</html>
