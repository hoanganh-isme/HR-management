<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.1, maximum-scale=5.0">
  <title>Đăng nhập - HR Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./src/css/styles.bundle.css?v=4">

  <!-- Theme Init -->
  <script>
    (function () {
      var savedTheme = localStorage.getItem('pmql_theme') || 'auto';
      if (savedTheme === 'dark' || (savedTheme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark-theme');
      }
    })();
  </script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --auth-bg: #f8fafc;
      --auth-panel: #ffffff;
      --auth-border: #e2e8f0;
      --auth-text: #0f172a;
      --auth-muted: #64748b;
      --auth-primary: #4F46E5;
      --auth-primary-hover: #4338CA;
    }

    html.dark-theme,
    body.dark-theme {
      --auth-bg: #0f172a;
      --auth-panel: #1e293b;
      --auth-border: #334155;
      --auth-text: #f8fafc;
      --auth-muted: #94a3b8;
    }

    html,
    body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--auth-bg);
      color: var(--auth-text);
    }

    /* ═══ SPLIT LAYOUT ═══ */
    .login-wrapper {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* ─── LEFT HERO PANEL ─── */
    .hero-panel {
      flex: 0 0 58%;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .hero-panel img.hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* Gradient overlay */
    .hero-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg,
          rgba(10, 8, 40, 0.15) 0%,
          rgba(30, 15, 70, 0.3) 40%,
          rgba(10, 5, 40, 0.75) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 48px 52px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 100px;
      padding: 6px 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }

    .hero-badge span {
      font-size: 16px;
    }

    .hero-title {
      font-size: clamp(28px, 3.5vw, 42px);
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .hero-title em {
      font-style: normal;
      background: linear-gradient(90deg, #c4b5fd, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-desc {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.6;
      max-width: 380px;
      margin-bottom: 32px;
    }

    .hero-stats {
      display: flex;
      gap: 28px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-val {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 500;
    }

    /* ─── RIGHT FORM PANEL ─── */
    .form-panel {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--auth-panel);
      padding: 48px 40px;
      position: relative;
      overflow-y: auto;
    }

    .form-panel-inner {
      width: 100%;
      max-width: 360px;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(16px);
    }

    .theme-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: transparent;
      border: 1px solid var(--auth-border);
      color: var(--auth-muted);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .theme-btn:hover {
      background: var(--auth-bg);
      color: var(--auth-text);
    }

    /* Brand */
    .form-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .form-brand-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
    }

    .form-brand-text h1 {
      font-size: 20px;
      font-weight: 800;
      color: var(--auth-text);
      letter-spacing: -0.3px;
      margin-bottom: 2px;
    }

    .form-brand-text p {
      font-size: 12.5px;
      color: var(--auth-muted);
      font-weight: 500;
    }

    /* Form elements */
    .form-heading {
      font-size: 26px;
      font-weight: 800;
      color: var(--auth-text);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .form-subheading {
      font-size: 14px;
      color: var(--auth-muted);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--auth-text);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      color: var(--auth-muted);
      display: flex;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border-radius: 10px;
      border: 1.5px solid var(--auth-border);
      background: var(--auth-bg);
      color: var(--auth-text);
      font-size: 14.5px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-input.has-toggle {
      padding-right: 42px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--auth-primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      background: var(--auth-panel);
    }

    .form-input::placeholder {
      color: var(--auth-muted);
      opacity: 0.7;
    }

    .btn-toggle-pw {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--auth-muted);
      cursor: pointer;
      display: flex;
      padding: 2px;
      transition: color 0.2s;
    }

    .btn-toggle-pw:hover {
      color: var(--auth-primary);
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      font-size: 13.5px;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--auth-muted);
      cursor: pointer;
      font-weight: 500;
    }

    .checkbox-wrap input {
      accent-color: var(--auth-primary);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .link {
      color: var(--auth-primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 13.5px;
    }

    .link:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--auth-primary) 0%, #6d28d9 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.25);
      letter-spacing: 0.01em;
    }

    .btn-login:hover:not(:disabled) {
      filter: brightness(1.08);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-spinner {
      display: none;
      width: 17px;
      height: 17px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #login-error {
      background: rgba(225, 29, 72, 0.08);
      color: #e11d48;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13.5px;
      margin-bottom: 18px;
      display: none;
      border: 1px solid rgba(225, 29, 72, 0.2);
    }

    .form-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--auth-muted);
    }

    .form-footer strong {
      color: var(--auth-text);
      font-weight: 600;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .hero-panel {
        display: none;
      }

      .form-panel {
        flex: 1;
      }
    }

    @media (max-width: 480px) {
      .form-panel {
        padding: 36px 24px;
      }
    }
  </style>
</head>

<body>
  <div class="login-wrapper">

    <!-- ═══ LEFT: HERO IMAGE ═══ -->
    <div class="hero-panel">
      <img class="hero-img" src="./src/assets/LogoBanner.png" alt="HR management workspace">
      <div class="hero-content">
        <div class="hero-badge">
          <span></span> Nền tảng quản lý nhân sự
        </div>
        <h2 class="hero-title">
          Dim Tu Tac<br>
          <em></em>
        </h2>
        <p class="hero-desc">
          Hệ thống quản lý nhân sự toàn diện.
        </p>
      </div>
    </div>

    <!-- ═══ RIGHT: FORM PANEL ═══ -->
    <div class="form-panel">

      <!-- Theme toggle -->
      <button class="theme-btn" id="btn-theme" aria-label="Đổi giao diện">
        <svg id="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg id="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          style="display:none">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>

      <div class="form-panel-inner">
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 36px;">
          <img src="./src/assets/logo-full-cropped.png" class="app-logo-light" alt="Nhân sự Logo"
            style="width: 200px; height: auto; max-width: 100%;">
          <img src="./src/assets/logo-full-cropped-dark.png" class="app-logo-dark" alt="Nhân sự Logo"
            style="width: 200px; height: auto; max-width: 100%;">
        </div>

        <form id="login-form">
          <div id="login-error"></div>

          <div class="form-group">
            <label class="form-label" for="login-username">Tên đăng nhập</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </span>
              <input type="text" id="login-username" class="form-input" placeholder="Nhập tên đăng nhập"
                autocomplete="username" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">Mật khẩu</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
              </span>
              <input type="password" id="login-password" class="form-input has-toggle" placeholder="Nhập mật khẩu"
                autocomplete="current-password" required>
              <button type="button" class="btn-toggle-pw" aria-label="Hiện/Ẩn mật khẩu">
                <svg class="eye-open" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="eye-off" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-row">
            <label class="checkbox-wrap">
              <input type="checkbox" id="remember-me">
              Ghi nhớ đăng nhập
            </label>
            <a href="#" class="link">Quên mật khẩu?</a>
          </div>

          <button type="submit" class="btn-login" id="btn-login">
            <span class="btn-spinner" id="login-spinner"></span>
            <span id="btn-login-text">Đăng nhập</span>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              id="btn-login-arrow">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </form>

        <div class="form-footer">
          <strong>© Copy Right 2026</strong>
        </div>
      </div>
    </div>

  </div>

  <script src="./env.js?v=2"></script>
  <script src="./src/js/utils/apiClient.js?v=1"></script>
  <script>
    // 1. Redirect nếu đã đăng nhập
    if (typeof ApiClient !== 'undefined' && ApiClient.getCookie) {
      if (ApiClient.getCookie('auth_token')) {
        window.location.href = 'index.html';
      }
    }

    // 2. Theme Toggle
    (function () {
      var btnTheme = document.getElementById('btn-theme');
      var iconMoon = document.getElementById('icon-moon');
      var iconSun = document.getElementById('icon-sun');

      function updateThemeUI(isDark) {
        if (isDark) {
          document.body.classList.add('dark-theme');
          document.documentElement.classList.add('dark-theme');
          iconMoon.style.display = 'none';
          iconSun.style.display = 'block';
        } else {
          document.body.classList.remove('dark-theme');
          document.documentElement.classList.remove('dark-theme');
          iconMoon.style.display = 'block';
          iconSun.style.display = 'none';
        }
      }

      var savedTheme = localStorage.getItem('pmql_theme') || 'auto';
      var isDark = savedTheme === 'dark' || (savedTheme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      updateThemeUI(isDark);

      btnTheme.addEventListener('click', function () {
        var currentlyDark = document.body.classList.contains('dark-theme');
        localStorage.setItem('pmql_theme', !currentlyDark ? 'dark' : 'light');
        updateThemeUI(!currentlyDark);
      });
    })();

    // 3. Password Toggle
    (function () {
      var btnToggle = document.querySelector('.btn-toggle-pw');
      var inputPw = document.getElementById('login-password');
      var eyeOpen = btnToggle.querySelector('.eye-open');
      var eyeOff = btnToggle.querySelector('.eye-off');
      btnToggle.addEventListener('click', function () {
        var isPassword = inputPw.type === 'password';
        inputPw.type = isPassword ? 'text' : 'password';
        eyeOpen.style.display = isPassword ? 'none' : 'block';
        eyeOff.style.display = isPassword ? 'block' : 'none';
      });
    })();

    // 4. Remember Me & Login
    (function () {
      const usernameInput = document.getElementById('login-username');
      const passwordInput = document.getElementById('login-password');
      const rememberBox = document.getElementById('remember-me');

      const b64Encode = (str) => btoa(unescape(encodeURIComponent(str)));
      const b64Decode = (str) => { try { return decodeURIComponent(escape(atob(str))); } catch (e) { return ''; } };

      setTimeout(() => {
        const ru = localStorage.getItem('remember_user');
        const rp = localStorage.getItem('remember_pw');
        if (ru && rp) { usernameInput.value = ru; passwordInput.value = b64Decode(rp); rememberBox.checked = true; }
      }, 100);

      document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var user = usernameInput.value.trim();
        var pass = passwordInput.value;
        var errEl = document.getElementById('login-error');
        var btnText = document.getElementById('btn-login-text');
        var btnSpin = document.getElementById('login-spinner');
        var arrow = document.getElementById('btn-login-arrow');
        var btn = document.getElementById('btn-login');

        errEl.style.display = 'none';

        if (user && pass) {
          btnText.innerText = 'Đang đăng nhập...';
          btnSpin.style.display = 'block';
          if (arrow) arrow.style.display = 'none';
          btn.disabled = true;

          ApiClient.post(API_CONFIG.ENDPOINTS.AUTH.LOGIN, { username: user, password: pass })
            .then(function (res) {
              if (res && res.code === 0) {
                var token = res.access_token || '';
                if (token && typeof ApiClient !== 'undefined' && ApiClient.setCookie) {
                  ApiClient.setCookie('auth_token', token, 7);
                }
                if (rememberBox.checked) {
                  localStorage.setItem('remember_user', user);
                  localStorage.setItem('remember_pw', b64Encode(pass));
                } else {
                  localStorage.removeItem('remember_user');
                  localStorage.removeItem('remember_pw');
                }
                res.UserName = res.UserName || res.Username || res.username || res.TaiKhoan || user;
                localStorage.setItem('pmql_user', JSON.stringify(res));
                window.location.href = 'index.html';
              } else {
                throw new Error(res.msg || 'Tên đăng nhập hoặc mật khẩu không đúng');
              }
            })
            .catch(function (err) {
              errEl.innerText = err.message || 'Lỗi kết nối máy chủ';
              errEl.style.display = 'block';
              btnText.innerText = 'Đăng nhập';
              btnSpin.style.display = 'none';
              if (arrow) arrow.style.display = 'block';
              btn.disabled = false;
            });
        }
      });
    })();
  </script>
</body>

</html>
