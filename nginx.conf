server {
    listen 80;
    server_name localhost;

    # Gzip settings for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index login.html index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /docserver/ requests to backend-app (Bun server)
    location /docserver/ {
        proxy_pass http://backend-app:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /onlyoffice/ requests to OnlyOffice document server
    location /onlyoffice/ {
        rewrite ^/onlyoffice/(?:[\d\.]+-[\da-fA-F]+/)?(.*)$ /$1 break;
        proxy_pass http://onlyoffice:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # Proxy OnlyOffice static cache paths directly to OnlyOffice
    location ~* ^/(?:[\w\.-]+/)?(web-apps|sdkjs|fonts|welcome|dictionaries|info|coauthoring|cache)(/.*)?$ {
        proxy_pass http://onlyoffice:80/$1$2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }
}
