map $http_x_forwarded_proto $forwarded_scheme {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

map $http_x_forwarded_host $forwarded_host {
    default $http_x_forwarded_host;
    ""      $http_host;
}

map $http_upgrade $proxy_connection {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # Gzip settings for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index login.html index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /docserver/ requests to the Node.js document API.
    location /docserver/ {
        proxy_pass http://backend-app:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Proxy /onlyoffice/ requests to OnlyOffice document server
    location /onlyoffice/ {
        proxy_pass http://onlyoffice:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $proxy_connection;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
        proxy_set_header X-Forwarded-Host $forwarded_host/onlyoffice;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
